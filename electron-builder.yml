appId: com.sightcue.app
productName: SightCue
directories:
  output: release
mac:
  category: public.app-category.utilities
  target:
    - dir
  identity: null
  forceCodeSigning: false
  icon: resources/icon.icns
  extendInfo:
    NSCameraUsageDescription: "This app needs camera access for real-time vision analysis and trigger detection."
win:
  target:
    - nsis
  icon: resources/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
files:
  - main.js
  - lib/**/*
  - renderer/**/*
  - package.json
  - node_modules/**/*
extraResources:
  - from: release/python-backend/vision-backend/
    to: python-backend/
asar: true
